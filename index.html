<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #ff4d00;
    --accent2: #ff8c00;
    --text: #f0f0f0;
    --text-soft: #888;
    --correct: #00c864;
    --wrong: #ff1a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* Red flash overlay */
  #flash-overlay {
    position: fixed;
    inset: 0;
    background: var(--wrong);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.1s;
  }

  #flash-overlay.flash {
    animation: flashRed 0.5s ease forwards;
  }

  @keyframes flashRed {
    0%   { opacity: 0.45; }
    100% { opacity: 0; }
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 24px 20px;
  }

  /* ===== INTRO ===== */
  #screen-intro {
    text-align: center;
    animation: fadeUp 0.7s ease both;
  }

  .intro-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 20px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .intro-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .intro-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 12vw, 7rem);
    line-height: 0.9;
    letter-spacing: 2px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #f0f0f0 0%, #888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .intro-title span {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .intro-sub {
    color: var(--text-soft);
    font-size: 1rem;
    font-weight: 300;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .intro-sub strong {
    color: var(--text);
    font-weight: 600;
  }

  .btn-start {
    background: var(--accent);
    color: white;
    border: none;
    padding: 18px 56px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: transform 0.15s, background 0.15s;
  }

  .btn-start:hover {
    background: var(--accent2);
    transform: scale(1.04);
  }

  /* ===== QUESTION SCREEN ===== */
  #screen-question {
    display: none;
  }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }

  .progress-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  .q-counter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .score-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-soft);
    font-size: 0.8rem;
    padding: 6px 14px;
    font-weight: 500;
    white-space: nowrap;
  }

  .q-emoji {
    font-size: 3rem;
    display: block;
    margin-bottom: 14px;
    animation: wiggle 0.5s ease;
  }

  @keyframes wiggle {
    0%   { transform: rotate(0deg) scale(0.8); }
    30%  { transform: rotate(-8deg) scale(1.1); }
    60%  { transform: rotate(6deg) scale(1.05); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .q-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: 1px;
    margin-bottom: 28px;
    color: var(--text);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .choice::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.15s;
  }

  .choice:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(4px);
  }

  .choice:hover:not(.disabled)::before {
    transform: scaleY(1);
  }

  .choice-letter {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .choice.correct {
    border-color: var(--correct);
    background: rgba(0, 200, 100, 0.08);
    pointer-events: none;
  }

  .choice.correct .choice-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: #000;
  }

  .choice.correct::before { background: var(--correct); transform: scaleY(1); }

  .choice.wrong {
    border-color: var(--wrong);
    background: rgba(255, 26, 26, 0.08);
    pointer-events: none;
  }

  .choice.wrong .choice-letter {
    background: var(--wrong);
    border-color: var(--wrong);
    color: white;
  }

  .choice.wrong::before { background: var(--wrong); transform: scaleY(1); }

  .choice.disabled {
    pointer-events: none;
    opacity: 0.4;
  }

  .feedback {
    margin-top: 20px;
    padding: 14px 18px;
    font-size: 0.9rem;
    font-weight: 500;
    border-left: 3px solid transparent;
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.25s;
    display: none;
  }

  .feedback.show {
    opacity: 1;
    transform: translateY(0);
    display: block;
  }

  .feedback.good {
    border-color: var(--correct);
    background: rgba(0, 200, 100, 0.06);
    color: var(--correct);
  }

  .feedback.bad {
    border-color: var(--wrong);
    background: rgba(255, 26, 26, 0.06);
    color: #ff6666;
  }

  .btn-next {
    margin-top: 20px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 14px 36px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    display: block;
    margin-left: auto;
    transition: border-color 0.15s, color 0.15s, transform 0.1s;
    opacity: 0;
    pointer-events: none;
  }

  .btn-next.visible {
    opacity: 1;
    pointer-events: all;
  }

  .btn-next:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateX(4px);
  }

  /* ===== RESULT ===== */
  #screen-result {
    display: none;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .result-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 20px;
  }

  .result-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 8px;
  }

  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    line-height: 1;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .result-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 15vw, 8rem);
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 10px 0 20px;
  }

  .result-msg {
    color: var(--text-soft);
    font-size: 1rem;
    font-weight: 300;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .btn-restart {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 14px 40px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .btn-restart:hover {
    background: var(--accent);
    color: white;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-anim {
    animation: fadeUp 0.35s ease both;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 3px;
    background: var(--accent);
    margin: 0 auto 24px;
  }

  @media (max-width: 480px) {
    .app { padding: 20px 16px; }
    .choice { padding: 14px 16px; font-size: 0.9rem; }
  }
</style>
</head>

const TOTAL = 25;
let questions = [];
let current = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  questions = shuffle(ALL_QUESTIONS).slice(0, TOTAL);
  current = 0;
  score = 0;
  hide('screen-intro');
  hide('screen-result');
  show('screen-question');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];

  document.getElementById('q-counter').textContent =
    String(current + 1).padStart(2, '0') + ' / ' + String(TOTAL).padStart(2, '0');
  document.getElementById('score-display').textContent = score;
  document.getElementById('progress-fill').style.width = (current / TOTAL * 100) + '%';
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent = q.q;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const btn = document.getElementById('btn-next');
  btn.className = 'btn-next';
  btn.textContent = current < TOTAL - 1 ? 'NEXT →' : 'SEE RESULTS →';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const text = q[letter];
    if (!text) return;
    const b = document.createElement('button');
    b.className = 'choice';
    b.innerHTML = `<span class="choice-letter">${letter}</span><span>${text}</span>`;
    b.onclick = () => selectAnswer(letter);
    choicesEl.appendChild(b);
  });

  const wrap = document.getElementById('q-wrap');
  wrap.style.animation = 'none';
  wrap.offsetHeight;
  wrap.style.animation = 'fadeUp 0.35s ease both';
}

function triggerFlash() {
  const overlay = document.getElementById('flash-overlay');
  overlay.classList.remove('flash');
  overlay.offsetHeight;
  overlay.classList.add('flash');
}

function selectAnswer(letter) {
  if (answered) return;
  answered = true;

  const correct = questions[current].ans;
  document.querySelectorAll('.choice').forEach(btn => {
    const l = btn.querySelector('.choice-letter').textContent;
    if (l === correct) btn.classList.add('correct');
    else if (l === letter && letter !== correct) btn.classList.add('wrong');
    else btn.classList.add('disabled');
  });

  const fb = document.getElementById('feedback');

  if (letter === correct) {
    score++;
    document.getElementById('score-display').textContent = score;
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback good show';
  } else {
    triggerFlash();
    fb.textContent = `✗ Wrong — it was ${correct}: ${questions[current][correct]}`;
    fb.className = 'feedback bad show';
  }

  document.getElementById('btn-next').className = 'btn-next visible';
}

function nextQuestion() {
  current++;
  if (current < TOTAL) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  hide('screen-question');
  show('screen-result');

  document.getElementById('progress-fill').style.width = '100%';
  const pct = score / TOTAL;

  let emoji, title, msg;
  if (pct === 1)       { emoji = '👑'; title = 'PERFECT.';        msg = 'You are basically Titou at this point.'; }
  else if (pct >= 0.8) { emoji = '🔥'; title = 'VERY GOOD.';      msg = 'You really know your guy.'; }
  else if (pct >= 0.6) { emoji = '⚡'; title = 'NOT BAD.';         msg = 'Some things you clearly missed.'; }
  else if (pct >= 0.4) { emoji = '😬'; title = 'AVERAGE.';         msg = 'You know him, but not that well.'; }
  else                 { emoji = '💀'; title = 'WHO IS TITOU?';    msg = 'You might want to spend more time with him.'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = score + ' / ' + TOTAL;
  document.getElementById('result-msg').textContent = msg;
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
</script>
